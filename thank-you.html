<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0a0a0a;
  --bg-card: #161616;
  --text-primary: #ffffff;
  --text-secondary: #b0b0b0;
  --accent: #d42027;
  --accent-hover: #e8333a;
  --border: #252525;
}
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 56px 48px;
  max-width: 540px;
  width: 100%;
  text-align: center;
}
.check {
  width: 72px; height: 72px;
  background: rgba(34,197,94,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 32px;
  color: #22c55e;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
p {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.6;
  font-weight: 300;
  margin-bottom: 8px;
}
.phone {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-top: 20px;
  text-decoration: none;
}
.phone:hover { color: var(--accent-hover); }
.back-link {
  display: inline-block;
  margin-top: 28px;
  color: var(--text-secondary);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 10px 28px;
  border-radius: 6px;
  transition: 0.3s ease;
}
.back-link:hover { border-color: var(--accent); color: var(--accent); }
